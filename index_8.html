<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sotalia Sightings — Bocas del Toro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--surface:#161b22;--surface2:#21262d;
      --border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
    }
    html,body{height:100%;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text)}
    #app{display:flex;flex-direction:column;height:100vh}

    /* Header */
    header{
      padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap
    }
    .title-block{display:flex;align-items:baseline;gap:10px}
    .title-block h1{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;letter-spacing:-.02em}
    .title-block .sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted)}
    .stats{display:flex;gap:24px}
    .stat .val{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500;line-height:1}
    .stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:1px}

    /* Controls */
    #controls{
      padding:9px 20px;background:var(--surface);border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:18px;flex-wrap:wrap
    }
    .ctrl-row{display:flex;align-items:center;gap:8px}
    .ctrl-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);white-space:nowrap}
    .mode-btn{
      font-family:'IBM Plex Mono',monospace;font-size:11px;padding:4px 11px;border-radius:4px;
      border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .14s
    }
    .mode-btn:hover{border-color:var(--accent);color:var(--text)}
    .mode-btn.on{background:var(--accent);border-color:var(--accent);color:#000;font-weight:500}
    .pill{
      font-family:'IBM Plex Mono',monospace;font-size:11px;padding:3px 10px;border-radius:20px;
      border:1px solid;background:transparent;cursor:pointer;display:inline-flex;align-items:center;
      gap:5px;transition:opacity .14s
    }
    .pill .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .pill.off{opacity:.28}
    .sep{width:1px;height:20px;background:var(--border);flex-shrink:0}

    /* Map */
    #map-wrap{flex:1;position:relative}
    #map{width:100%;height:100%}
    .leaflet-tile{filter:brightness(.52) saturate(.35)}

    /* Badge */
    #badge{
      position:absolute;top:12px;left:12px;z-index:1000;
      background:var(--surface);border:1px solid var(--border);border-radius:4px;
      padding:5px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted)
    }
    #badge b{color:var(--text);font-weight:500}

    /* Legend */
    #legend{
      position:absolute;bottom:28px;right:12px;z-index:1000;
      background:var(--surface);border:1px solid var(--border);border-radius:6px;
      padding:14px 16px;min-width:170px;pointer-events:none
    }
    .leg-title{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
    .leg-row{display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:5px;color:var(--text)}
    .leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .leg-hr{border:none;border-top:1px solid var(--border);margin:10px 0}
    .leg-sizes{display:flex;align-items:flex-end;gap:10px;margin-top:4px}
    .leg-sz{display:flex;flex-direction:column;align-items:center;gap:3px}
    .leg-sz .lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
    .leg-sz .circ{background:var(--muted);border-radius:50%;opacity:.55}

    /* Popup */
    .leaflet-popup-content-wrapper{
      background:var(--surface2)!important;border:1px solid var(--border)!important;
      border-radius:6px!important;box-shadow:0 10px 28px rgba(0,0,0,.55)!important;color:var(--text)!important
    }
    .leaflet-popup-tip{background:var(--surface2)!important}
    .leaflet-popup-content{margin:14px 16px!important;min-width:190px}
    .pop-title{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;margin-bottom:6px}
    .pop-badge{display:inline-block;padding:2px 8px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;margin-bottom:9px}
    .pop-row{display:flex;justify-content:space-between;gap:14px;font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)}
    .pop-row:last-child{border-bottom:none}
    .pop-k{color:var(--muted)}
    .pop-v{font-family:'IBM Plex Mono',monospace}
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="title-block">
      <h1>Sotalia sightings</h1>
      <span class="sub">Bocas del Toro &middot; 2003&ndash;2006</span>
    </div>
    <div class="stats">
      <div class="stat"><div class="val" id="s-n">—</div><div class="lbl">sightings</div></div>
      <div class="stat"><div class="val" id="s-avg">—</div><div class="lbl">avg group</div></div>
      <div class="stat"><div class="val" id="s-calves">—</div><div class="lbl">with calves</div></div>
    </div>
  </header>

  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-lbl">Color by</span>
      <button class="mode-btn on"  data-mode="species">Species</button>
      <button class="mode-btn"     data-mode="calves">Calves</button>
      <button class="mode-btn"     data-mode="behavior">Behavior</button>
    </div>
    <div class="sep"></div>
    <div class="ctrl-row" id="sp-filters"><span class="ctrl-lbl">Species</span></div>
    <div class="sep"></div>
    <div class="ctrl-row" id="bh-filters"><span class="ctrl-lbl">Behavior</span></div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
    <div id="badge">Showing <b id="vis-n">—</b> sightings</div>
    <div id="legend">
      <div class="leg-title" id="leg-title">Species</div>
      <div id="leg-items"></div>
      <div class="leg-hr"></div>
      <div class="leg-title">Group size</div>
      <div class="leg-sizes" id="leg-sizes"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

alves":"No"},{"lat":9.61176,"lng":-82.60707,"date":"2006-09-02","species":"Mixed","gs":4,"behavior":"Social","calves":"Yes"},{"lat":9.58531,"lng":-82.57193,"date":"2006-09-02","species":"TT","gs":4,"behavior":"Social","calves":"Yes"},{"lat":9.36522,"lng":-82.35679,"date":"2004-07-24","species":"MSG","gs":32,"behavior":"Social","calves":"Unknown"},{"lat":9.58624,"lng":-82.57021,"date":"2006-09-02","species":"SG","gs":40,"behavior":"Social","calves":"Unknown"},{"lat":9.3771,"lng":-82.3637,"date":"2003-08-22","species":"MSG","gs":15,"behavior":"Social","calves":"No"},{"lat":9.3538,"lng":-82.356,"date":"2003-10-08","species":"MSG","gs":9,"behavior":"Social","calves":"No"},{"lat":9.3503,"lng":-82.3438,"date":"2003-10-07","species":"SG","gs":4,"behavior":"Social","calves":"No"},{"lat":9.59779,"lng":-82.57901,"date":"2005-11-02","species":"MSG","gs":12,"behavior":"Social","calves":"No"},{"lat":9.61515,"lng":-82.59924,"date":"2005-11-24","species":"MSG","gs":25,"behavior":"Social","calves":"No"},{"lat":9.62883,"lng":-82.60878,"date":"2006-09-02","species":"TT","gs":2,"behavior":"Travel","calves":"No"},{"lat":9.61708,"lng":-82.59925,"date":"2006-08-31","species":"TT","gs":8,"behavior":"Travel","calves":"Yes"},{"lat":9.60695,"lng":-82.59046,"date":"2006-09-03","species":"Mixed","gs":9,"behavior":"Travel","calves":"Unknown"}];

const PALETTE = {
  species:  {MSG:'#3fb950',SG:'#58a6ff',TT:'#f78166',Mixed:'#d2a8ff'},
  calves:   {Yes:'#ffa657',No:'#6e7681',Unknown:'#8b949e'},
  behavior: {Travel:'#58a6ff',Social:'#d2a8ff',Foraging:'#3fb950',Resting:'#ffa657',Diving:'#f78166',unknown:'#6e7681'}
};
const LABELS = {
  species:  {MSG:'MSG — S. guianensis',SG:'SG — S. fluviatilis',TT:'TT — T. truncatus',Mixed:'Mixed species'},
  calves:   {Yes:'Calves present',No:'No calves',Unknown:'Unknown'},
  behavior: {Travel:'Travel',Social:'Social',Foraging:'Foraging',Resting:'Resting',Diving:'Diving',unknown:'Unknown'}
};

let colorMode = 'species';
const active  = {
  species:  new Set(DATA.map(d=>d.species)),
  behavior: new Set(DATA.map(d=>d.behavior))
};
const GS_MIN = Math.min(...DATA.map(d=>d.gs));
const GS_MAX = Math.max(...DATA.map(d=>d.gs));

function radius(gs){ return 5+((gs-GS_MIN)/(GS_MAX-GS_MIN))*17; }
function colorOf(d){
  const key = colorMode==='species' ? d.species : colorMode==='calves' ? d.calves : d.behavior;
  return PALETTE[colorMode][key]||'#888';
}
function visible(d){ return active.species.has(d.species) && active.behavior.has(d.behavior); }

// Map
const map   = L.map('map',{zoomControl:false});
const layer = L.layerGroup().addTo(map);
L.control.zoom({position:'bottomleft'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>',maxZoom:18
}).addTo(map);
map.fitBounds(DATA.map(d=>[d.lat,d.lng]),{padding:[32,32]});

function render(){
  layer.clearLayers();
  const vis = DATA.filter(visible);
  vis.forEach(d=>{
    const col = colorOf(d);
    const m = L.circleMarker([d.lat,d.lng],{
      radius:radius(d.gs),fillColor:col,color:col,
      weight:1.5,opacity:.9,fillOpacity:.58
    });
    m.bindPopup(`
      <div class="pop-title">${d.species} &middot; ${d.date}</div>
      <span class="pop-badge" style="background:${col}1f;color:${col}">${d.behavior}</span>
      <div class="pop-row"><span class="pop-k">Group size</span><span class="pop-v">${d.gs}</span></div>
      <div class="pop-row"><span class="pop-k">Calves</span><span class="pop-v">${d.calves}</span></div>
      <div class="pop-row"><span class="pop-k">Date</span><span class="pop-v">${d.date}</span></div>
      <div class="pop-row"><span class="pop-k">Lat / Lon</span><span class="pop-v">${d.lat.toFixed(4)}, ${d.lng.toFixed(4)}</span></div>
    `,{maxWidth:240});
    layer.addLayer(m);
  });
  const n   = vis.length;
  const avg = n?(vis.reduce((s,d)=>s+d.gs,0)/n).toFixed(1):'—';
  document.getElementById('vis-n').textContent  = n;
  document.getElementById('s-n').textContent    = n;
  document.getElementById('s-avg').textContent  = avg;
  document.getElementById('s-calves').textContent = vis.filter(d=>d.calves==='Yes').length;
  renderLegend(vis);
}

function renderLegend(vis){
  const pal   = PALETTE[colorMode];
  const labs  = LABELS[colorMode];
  const pres  = new Set(vis.map(d=>colorMode==='species'?d.species:colorMode==='calves'?d.calves:d.behavior));
  document.getElementById('leg-title').textContent = {species:'Species',calves:'Calf presence',behavior:'Behavior'}[colorMode];
  document.getElementById('leg-items').innerHTML = Object.entries(labs)
    .filter(([k])=>pres.has(k))
    .map(([k,l])=>`<div class="leg-row"><span class="leg-dot" style="background:${pal[k]}"></span><span>${l}</span></div>`)
    .join('');
  const steps=[GS_MIN,Math.round((GS_MIN+GS_MAX)/2),GS_MAX];
  document.getElementById('leg-sizes').innerHTML = steps.map(gs=>{
    const px=radius(gs)*2;
    return `<div class="leg-sz"><div class="circ" style="width:${px}px;height:${px}px"></div><span class="lbl">${gs}</span></div>`;
  }).join('');
}

// Filter pills
function buildPills(){
  const spEl = document.getElementById('sp-filters');
  const bhEl = document.getElementById('bh-filters');
  [...active.species].sort().forEach(sp=>{
    const col=PALETTE.species[sp]||'#888';
    const b=document.createElement('button');
    b.className='pill'; b.dataset.group='species'; b.dataset.val=sp;
    b.style.cssText=`color:${col};border-color:${col}`;
    b.innerHTML=`<span class="dot" style="background:${col}"></span>${sp}`;
    b.onclick=()=>toggle(b,'species',sp);
    spEl.appendChild(b);
  });
  [...active.behavior].sort().forEach(bh=>{
    const col=PALETTE.behavior[bh]||'#888';
    const b=document.createElement('button');
    b.className='pill'; b.dataset.group='behavior'; b.dataset.val=bh;
    b.style.cssText=`color:${col};border-color:${col}`;
    b.innerHTML=`<span class="dot" style="background:${col}"></span>${bh}`;
    b.onclick=()=>toggle(b,'behavior',bh);
    bhEl.appendChild(b);
  });
}
function toggle(btn,grp,val){
  const s=active[grp];
  if(s.has(val)){if(s.size===1)return;s.delete(val);btn.classList.add('off');}
  else{s.add(val);btn.classList.remove('off');}
  render();
}

document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    colorMode=btn.dataset.mode;
    render();
  });
});

buildPills();
render();
</script>
