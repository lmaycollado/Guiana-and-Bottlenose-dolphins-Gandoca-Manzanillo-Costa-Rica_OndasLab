<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#FAF7F2; --paper:#F3EEE6; --warm:#EDE5D8; --border:#D8CFBF;
  --text:#2A2118; --muted:#7A6E61; --accent:#2A5C45; --accent-lt:#3D7D60;
}

html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text)}
#app{display:flex;flex-direction:column;height:100vh}

/* ── Header ──────────────────────────────────────────────────── */
#hdr{
  background:var(--cream);border-bottom:1.5px solid var(--border);
  padding:0 20px;display:flex;align-items:center;gap:0;
  height:54px;flex-shrink:0;z-index:500;
}
#hdr h1{
  font-family:'DM Serif Display',serif;font-size:1.15rem;font-weight:400;
  color:var(--text);white-space:nowrap;margin-right:5px;
}
#hdr h1 em{font-style:italic;color:var(--accent)}
#hdr .loc{font-size:0.75rem;color:var(--muted);white-space:nowrap}

.vd{width:1.5px;height:26px;background:var(--border);margin:0 16px;flex-shrink:0}

.ctrl-lbl{font-size:0.67rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);white-space:nowrap;margin-right:8px}
.pills{display:flex;gap:4px}
.pill{
  padding:5px 13px;border-radius:999px;font-size:0.78rem;font-weight:500;
  cursor:pointer;border:1.5px solid var(--border);background:transparent;
  color:var(--muted);transition:all .16s ease;white-space:nowrap;font-family:'DM Sans',sans-serif;
}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

.kpis{margin-left:auto;display:flex;gap:20px;flex-shrink:0}
.kpi{text-align:right}
.kpi-v{font-size:1rem;font-weight:600;color:var(--text);line-height:1}
.kpi-k{font-size:0.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:1px}

/* ── Map ─────────────────────────────────────────────────────── */
#map{flex:1;z-index:1}

/* ── Legend ──────────────────────────────────────────────────── */
.lgd{
  background:var(--cream);border:1.5px solid var(--border);border-radius:12px;
  padding:13px 15px;min-width:180px;font-family:'DM Sans',sans-serif;
  box-shadow:0 4px 20px rgba(42,33,24,.09);
}
.lgd-ttl{
  font-size:.61rem;font-weight:600;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border);
}
.lgd-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.lgd-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,.12)}
.lgd-lbl{font-size:.74rem;color:var(--text);line-height:1.2}
.lgd-n{font-size:.67rem;color:var(--muted);margin-left:auto;font-weight:500}
.lgd-sep{height:1px;background:var(--border);margin:9px 0}
.sz-row{display:flex;align-items:flex-end;gap:7px;padding-top:4px}
.sz-bbl{background:rgba(42,92,69,.16);border:1.5px solid rgba(42,92,69,.38);border-radius:50%;flex-shrink:0}
.sz-note{font-size:.63rem;color:var(--muted);line-height:1.35;padding-bottom:2px}

/* ── Outlier note ────────────────────────────────────────────── */
.out-note{
  position:absolute;bottom:14px;left:14px;z-index:900;
  background:#FFFBF5;border:1.5px solid #D4823A;border-radius:8px;
  padding:7px 11px;font-size:.68rem;color:#7A4010;max-width:215px;
  line-height:1.4;font-family:'DM Sans',sans-serif;
  box-shadow:0 2px 12px rgba(212,130,58,.14);
}

/* ── Popup ───────────────────────────────────────────────────── */
.leaflet-popup-content-wrapper{
  background:var(--cream);border:1.5px solid var(--border);
  border-radius:11px;box-shadow:0 8px 32px rgba(42,33,24,.14);padding:0;
}
.leaflet-popup-content{margin:0;min-width:215px}
.leaflet-popup-tip{background:var(--cream)}
.leaflet-popup-close-button{top:8px!important;right:10px!important;color:var(--muted)!important;font-size:16px!important}

.p-bar{height:4px;border-radius:4px 4px 0 0}
.p-body{padding:12px 15px}
.p-title{font-family:'DM Serif Display',serif;font-size:.97rem;color:var(--text);margin-bottom:1px;line-height:1.2}
.p-sub{font-size:.7rem;color:var(--muted);margin-bottom:9px}
.p-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 10px;font-size:.74rem}
.p-k{color:var(--muted)}
.p-v{color:var(--text);font-weight:500}
.p-chip{
  display:inline-block;padding:1px 8px;border-radius:999px;
  font-size:.67rem;font-weight:600;letter-spacing:.03em;
}
.p-sep{height:1px;background:var(--border);margin:8px 0}
.p-corr{font-size:.66rem;color:var(--muted);font-style:italic;line-height:1.35}
.p-warn{font-size:.66rem;color:#854010;background:#FFF0E0;border-radius:5px;padding:4px 7px;margin-top:4px;line-height:1.35}
</style>
</head>
<body>

    </div>
  </div>
  <div id="map"></div>
</div>

oord Note":""},{"Lat":9.56975,"Long":-82.550183,"Date":"2006-05-08","Hour":"08:37","Group":1,"Species":"SG","Calve Presence":"Yes","Group Size":4,"Behavior":"Travel","Coord Correction":"Yes – DM string converted","Coord Note":""},{"Lat":9.59,"Long":-82.57595,"Date":"2006-05-09","Hour":"10:30","Group":2,"Species":"SG","Calve Presence":"Yes","Group Size":14,"Behavior":"Travel","Coord Correction":"Yes – DM string converted","Coord Note":""},{"Lat":9.595333,"Long":-82.589033,"Date":"2006-06-05","Hour":"10:32","Group":4,"Species":"SG","Calve Presence":"Yes","Group Size":5,"Behavior":"Travel","Coord Correction":"Yes – DM string converted","Coord Note":""},{"Lat":9.60385,"Long":-82.58345,"Date":"2006-06-07","Hour":"08:18","Group":1,"Species":"TT","Calve Presence":"Yes","Group Size":7,"Behavior":"Travel","Coord Correction":"Yes – DM string converted","Coord Note":""},{"Lat":9.61708,"Long":-82.59925,"Date":"2006-08-31","Hour":"02:51","Group":1,"Species":"TT","Calve Presence":"Yes","Group Size":8,"Behavior":"Travel","Coord Correction":"Yes – Long sign fixed","Coord Note":""},{"Lat":9.584067,"Long":-82.5618,"Date":"2006-05-07","Hour":"12:34","Group":4,"Species":"SG","Calve Presence":"Unknown","Group Size":14,"Behavior":"Travel","Coord Correction":"Yes – DM string converted","Coord Note":""},{"Lat":9.599,"Long":-82.59615,"Date":"2006-06-05","Hour":"10:21","Group":3,"Species":"SG","Calve Presence":"Unknown","Group Size":4,"Behavior":"Travel","Coord Correction":"Yes – DM string converted","Coord Note":""},{"Lat":9.60695,"Long":-82.59046,"Date":"2006-09-03","Hour":"08:38","Group":1,"Species":"Mixed","Calve Presence":"Unknown","Group Size":9,"Behavior":"Travel","Coord Correction":"Yes – Long sign fixed","Coord Note":""},{"Lat":9.583467,"Long":-82.557817,"Date":"2006-06-07","Hour":"10:50","Group":3,"Species":"SG","Calve Presence":"No","Group Size":2,"Behavior":"unknown","Coord Correction":"Yes – DM string converted","Coord Note":""}];

const C={
  species:{
    MSG:  {f:'#2E86AB',s:'#1B5A7A',l:'MSG — Sotalia guianensis'},
    SG:   {f:'#4A9E6A',s:'#2E6A45',l:'SG — Sotalia guianensis'},
    TT:   {f:'#D4703A',s:'#9A4E22',l:'TT — Tursiops truncatus'},
    Mixed:{f:'#8E62AA',s:'#5E3A7E',l:'Mixed species'},
  },
  behavior:{
    Foraging:{f:'#B85C2A',s:'#8A3E18',l:'Foraging'},
    Social:  {f:'#A82E5C',s:'#7A1E40',l:'Social'},
    Travel:  {f:'#2868A8',s:'#184A80',l:'Travel'},
    Resting: {f:'#2E8870',s:'#1A5A4A',l:'Resting'},
    Diving:  {f:'#3A4AA8',s:'#222E80',l:'Diving'},
    unknown: {f:'#7A7060',s:'#504840',l:'Unknown'},
  },
  calves:{
    Yes:    {f:'#A82E5C',s:'#7A1E40',l:'Calves present'},
    No:     {f:'#2868A8',s:'#184A80',l:'No calves'},
    Unknown:{f:'#7A7060',s:'#504840',l:'Unknown'},
  }
};

function R(gs){return 5+(gs-2)/38*18;}

function style(d){
  const k=mode==='calves'?d['Calve Presence']:mode==='species'?d.Species:d.Behavior;
  return C[mode][k]||{f:'#888',s:'#555'};
}

function chip(f,t){return `<span class="p-chip" style="background:${f}1A;color:${f};border:1px solid ${f}44">${t}</span>`;}

function popup(d){
  const sp=C.species[d.Species]||{f:'#888'};
  const bh=C.behavior[d.Behavior]||{f:'#888'};
  const cv=C.calves[d['Calve Presence']]||{f:'#888'};
  const fixed=d['Coord Correction']!=='No';
  const warn=d['Coord Note']&&d['Coord Note'].length>0;
  return `<div class="p-bar" style="background:${sp.f}"></div>
<div class="p-body">
  <div class="p-title">${d.Species} · Group ${d.Group}</div>
  <div class="p-sub">${d.Date} &nbsp;·&nbsp; ${d.Hour}</div>
  <div class="p-grid">
    <span class="p-k">Species</span>    <span class="p-v">${chip(sp.f,d.Species)}</span>
    <span class="p-k">Behavior</span>   <span class="p-v">${chip(bh.f,d.Behavior)}</span>
    <span class="p-k">Calves</span>     <span class="p-v">${chip(cv.f,d['Calve Presence'])}</span>
    <span class="p-k">Group size</span> <span class="p-v">${d['Group Size']} individuals</span>
    <span class="p-k">Coords</span>     <span class="p-v">${d.Lat.toFixed(4)}, ${d.Long.toFixed(4)}</span>
  </div>
  ${fixed?`<div class="p-sep"></div><div class="p-corr">✓ ${d['Coord Correction']}</div>`:''}
  ${warn?`<div class="p-warn">⚠ ${d['Coord Note']}</div>`:''}
</div>`;
}

// Map
const map=L.map('map',{zoomControl:false});
L.control.zoom({position:'topright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

const main=DATA.filter(d=>d.Lat>9.5);
const lats=main.map(d=>d.Lat),lngs=main.map(d=>d.Long);
map.fitBounds([[Math.min(...lats)-0.012,Math.min(...lngs)-0.018],[Math.max(...lats)+0.012,Math.max(...lngs)+0.018]]);

let mode='species',markers=[],lgdCtrl=null;

function render(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  [...DATA].sort((a,b)=>b['Group Size']-a['Group Size']).forEach(d=>{
    const st=style(d);
    const isOut=d.Lat<9.5;
    const m=L.circleMarker([d.Lat,d.Long],{
      radius:R(d['Group Size']),
      fillColor:isOut?'#D4703A':st.f,
      fillOpacity:isOut?0.4:0.82,
      color:isOut?'#9A4E22':st.s,
      weight:isOut?2:1.5,
      dashArray:isOut?'5 3':null,
    });
    m.bindPopup(popup(d),{maxWidth:260});
    m.on('mouseover',function(){this.setStyle({weight:2.5,fillOpacity:isOut?0.6:0.95,color:'#1A1410'});this.bringToFront();});
    m.on('mouseout',function(){this.setStyle({weight:isOut?2:1.5,fillOpacity:isOut?0.4:0.82,color:isOut?'#9A4E22':st.s});});
    m.addTo(map);markers.push(m);
  });
  buildLgd();
}

function buildLgd(){
  if(lgdCtrl)map.removeControl(lgdCtrl);
  lgdCtrl=L.control({position:'bottomright'});
  lgdCtrl.onAdd=()=>{
    const div=L.DomUtil.create('div','lgd');
    const pal=C[mode];
    const kf=mode==='calves'?'Calve Presence':mode==='species'?'Species':'Behavior';
    const lbl=mode==='species'?'Species':mode==='behavior'?'Behavior':'Calf presence';
    let h=`<div class="lgd-ttl">${lbl}</div>`;
    Object.entries(pal).forEach(([k,v])=>{
      const n=DATA.filter(d=>d[kf]===k).length;
      h+=`<div class="lgd-row"><div class="lgd-dot" style="background:${v.f};border-color:${v.s}"></div><span class="lgd-lbl">${v.l}</span><span class="lgd-n">${n}</span></div>`;
    });
    h+=`<div class="lgd-sep"></div><div class="lgd-ttl">Group size</div>
<div class="sz-row">
  <div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div class="sz-bbl" style="width:10px;height:10px"></div><span style="font-size:.59rem;color:var(--muted)">2</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div class="sz-bbl" style="width:18px;height:18px"></div><span style="font-size:.59rem;color:var(--muted)">15</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div class="sz-bbl" style="width:28px;height:28px"></div><span style="font-size:.59rem;color:var(--muted)">30</span></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div class="sz-bbl" style="width:38px;height:38px"></div><span style="font-size:.59rem;color:var(--muted)">40</span></div>
  <span class="sz-note">individuals<br>per group</span>
</div>
<div class="lgd-sep"></div>
<div class="lgd-row" style="margin-bottom:0">
  <div class="lgd-dot" style="background:#D4703A33;border:1.5px dashed #D4703A"></div>
  <span class="lgd-lbl" style="font-size:.69rem;color:var(--muted)">Coord ambiguous (1)</span>
</div>`;
    div.innerHTML=h;return div;
  };
  lgdCtrl.addTo(map);
}

// KPI
const avg=(DATA.reduce((s,d)=>s+d['Group Size'],0)/DATA.length).toFixed(1);
document.getElementById('kAvg').textContent=avg;
document.getElementById('kCalves').textContent=DATA.filter(d=>d['Calve Presence']==='Yes').length;

// Outlier note
const note=document.createElement('div');
note.className='out-note';
note.innerHTML='⚠ 1 record (MSG, 2003-08-17) sits south of the refuge after coordinate correction — verify field notes';
document.getElementById('map').appendChild(note);

// Mode toggle
document.querySelectorAll('.pill').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');mode=this.dataset.mode;render();
  });
});

render();
</script>
